---

- name: Check if the ioc is a git repository before attempting to rollback
  ansible.builtin.stat:
    path: "{{ rollback_deployment_ioc_dir }}/.git"
  register: deploy_ioc_git_repo

- name: Fail if the ioc is not a git repository
  ansible.builtin.fail:
    msg: "The IOC directory {{ rollback_deployment_ioc_dir }} is not a git repository. Cannot perform rollback."
  when: not deploy_ioc_git_repo.stat.exists

- name: Check to make sure there are no uncommitted changes before attempting to rollback
  ansible.builtin.command: git status --porcelain
  args:
    chdir: "{{ rollback_deployment_ioc_dir }}"
  register: deploy_ioc_git_status
  changed_when: false

- name: Fail if there are uncommitted changes in the ioc directory
  ansible.builtin.fail:
    msg: "There are uncommitted changes in the IOC directory {{ rollback_deployment_ioc_dir }}. Please commit or stash these changes before attempting to rollback."
  when: deploy_ioc_git_status.stdout != ""

- name: Make sure there are enough commits to perform the rollback
  ansible.builtin.command: git rev-list --count HEAD
  args:
    chdir: "{{ rollback_deployment_ioc_dir }}"
  register: deploy_ioc_git_commit_count
  changed_when: false

- name: Fail if the requested rollback is greater than the number of commits in the repository
  ansible.builtin.fail:
    msg: "Cannot perform rollback of {{ rollback_deployment_num_rollback_steps }} steps because there are only {{ deploy_ioc_git_commit_count.stdout }} commits in the repository."
  when: deploy_ioc_git_commit_count.stdout | int < rollback_deployment_num_rollback_steps | int

- name: Rollback the deployment as the softioc user
  become: true
  become_user: "{{ host_config.softioc_user }}"
  ansible.builtin.command: git reset --hard HEAD~{{ rollback_deployment_num_rollback_steps }}
  args:
    chdir: "{{ rollback_deployment_ioc_dir }}"
  register: deploy_ioc_git_reset_result
  changed_when: true
  failed_when: deploy_ioc_git_reset_result.rc != 0
