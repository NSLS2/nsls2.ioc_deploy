---
verification:
  files_must_exist:
    # Standard IOC boot files (created by deploy_ioc)
    - iocBoot/st.cmd
    - iocBoot/epicsEnv.cmd
    - iocBoot/postInit.cmd
    # Role-specific files
    - iocBoot/base.cmd
    - settings/settings.txt
    - COW/
    - Correction/

  file_must_contain:
    iocBoot/st.cmd:
      - "iocInit"
    iocBoot/base.cmd:
      - "acmi2_registerRecordDeviceDriver"
      - "createPSC"
      - "setPSCSendBlockSize"
      - "ADC.db"
      - "Beam.db"
      - "control.db"

  file_must_not_contain:
    iocBoot/st.cmd:
      - "{{"
      - "}}"
    iocBoot/base.cmd:
      - "{{"
      - "}}"
    iocBoot/epicsEnv.cmd:
      - "{{"
      - "}}"

  permissions:
    iocBoot/st.cmd: "0775"
